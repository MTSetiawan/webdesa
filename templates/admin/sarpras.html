<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarana dan Prasarana</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #4c1d95, #6d28d9, #a78bfa);
        background-attachment: fixed;
        margin: 0;
        padding: 0;
        color: #3b0764;
      }

      .container {
        max-width: 900px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.18);
        animation: fadeIn 0.8s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        color: #6d28d9;
        font-weight: 800;
        font-size: 1.7rem;
        margin-bottom: 30px;
      }

      ul {
        list-style-type: none;
        padding: 0;
      }

      li {
        text-align: center;
        margin-bottom: 35px;
        font-size: 1.1rem;
        font-weight: 600;
        color: #4b0f6d;
      }

      img {
        display: block;
        margin: 12px auto 0;
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
        transition: 0.3s ease;
      }

      img:hover {
        transform: scale(1.02);
      }

      .btn-kembali {
        display: inline-block;
        margin-top: 15px;
        background: #6d28d9;
        color: white;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 700;
        box-shadow: 0 6px 12px rgba(109, 40, 217, 0.35);
        transition: 0.3s ease;
      }

      .btn-kembali:hover {
        background: #4c1d95;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Sarana dan Prasarana Balai Desa Bangsri</h2>

      <ul>
        <li>Kantor Desa</li>

        <li>Pendopo</li>
        <li>Ruang Rapat</li>
      </ul>

      <div style="text-align: center">
        <a href="{{ url_for('dashboard') }}" class="btn-kembali"
          >← Kembali ke Dashboard</a
        >
      </div>
    </div>
  </body>
</html>
